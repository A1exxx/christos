<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Christos · Движок</title>
<style>
  :root { --bg:#faf9f7; --fg:#1c1917; --muted:#78716c; --border:#e7e5e4; --accent:#a16207; --surface:#fff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 system-ui,"Segoe UI",sans-serif; }
  header { position:sticky; top:0; background:rgba(250,249,247,.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .logo { font-weight:600; letter-spacing:.18em; }
  .pill { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); border:1px solid var(--border); border-radius:999px; padding:4px 10px; }
  .pill b { color:var(--fg); }
  main { max-width:1200px; margin:0 auto; padding:24px; }
  .search { display:flex; gap:10px; margin:8px 0 24px; }
  .search input { flex:1; padding:14px 16px; border:1px solid var(--border); border-radius:8px; font:inherit; background:var(--surface); }
  button { font:inherit; cursor:pointer; border-radius:8px; border:1px solid var(--fg); background:var(--fg); color:var(--bg); padding:12px 18px; transition:.15s; }
  button.ghost { background:var(--surface); color:var(--fg); border-color:var(--border); }
  button:active { transform:scale(.98); }
  .tabs { display:flex; gap:8px; margin-bottom:18px; }
  .tabs button { padding:8px 14px; }
  .tabs button[aria-selected=false] { background:var(--surface); color:var(--muted); border-color:var(--border); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:18px; }
  .card { border:1px solid var(--border); border-radius:12px; background:var(--surface); overflow:hidden; display:flex; flex-direction:column; }
  .card img { width:100%; aspect-ratio:4/5; object-fit:cover; background:#f3f1ee; }
  .card .body { padding:12px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card h3 { margin:0; font-size:13px; font-weight:500; line-height:1.35; }
  .meta { font-size:12px; color:var(--muted); display:flex; gap:8px; flex-wrap:wrap; }
  .cls { font-size:11px; color:var(--accent); }
  .acts { display:flex; gap:8px; margin-top:auto; padding-top:8px; }
  .acts button { flex:1; padding:8px; font-size:13px; }
  .note { color:var(--muted); font-size:13px; }
  .summary { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:18px; font-size:13px; color:var(--muted); }
  .summary b { color:var(--fg); }
</style>
</head>
<body>
<header>
  <span class="logo">CHRISTOS · ДВИЖОК</span>
  <span class="pill">CJ: <b id="s-cj">…</b></span>
  <span class="pill">LLM: <b id="s-llm">…</b></span>
  <span class="pill">Очередь: <b id="s-pending">0</b></span>
  <span class="pill">Одобрено: <b id="s-approved">0</b></span>
  <span style="margin-left:auto"><button class="ghost" onclick="doPublish()">Опубликовать в витрину</button></span>
</header>
<main>
  <div class="tabs" style="margin-bottom:20px">
    <button id="m-products" aria-selected="true" onclick="setMode('products')">Поиск товаров</button>
    <button id="m-studio" aria-selected="false" onclick="setMode('studio')">Дизайн-студия</button>
  </div>

  <section id="view-products">
    <div class="search">
      <input id="prompt" placeholder="Что искать? напр.: христианские футболки с крестом, минимализм, рейтинг 4.5+" />
      <button onclick="doPreview()">Найти примеры</button>
    </div>
    <div id="summary"></div>
    <div id="preview"></div>
    <div class="tabs">
      <button data-tab="pending" aria-selected="true" onclick="switchTab('pending')">На модерации</button>
      <button data-tab="approved" aria-selected="false" onclick="switchTab('approved')">Одобрено</button>
      <button data-tab="rejected" aria-selected="false" onclick="switchTab('rejected')">Отклонено</button>
    </div>
    <div id="grid" class="grid"></div>
  </section>

  <section id="view-studio" style="display:none">
    <div class="search">
      <input id="dprompt" placeholder="Опиши принт: напр. «минималистичный крест с тонкими лучами» или «рыба ихтис одной линией»" />
      <button onclick="doDesign()">Сгенерировать</button>
    </div>
    <div id="dsummary"></div>
    <div id="dresult"></div>
  </section>
</main>
<script>
let tab = "pending";
const $ = (id) => document.getElementById(id);

async function refreshStatus() {
  const s = await (await fetch("/api/status")).json();
  $("s-cj").textContent = s.cj;
  $("s-llm").textContent = s.llm;
  $("s-pending").textContent = s.counts.pending;
  $("s-approved").textContent = s.counts.approved;
}

// Ступень 1 — примеры для одобрения направления
async function doPreview() {
  const prompt = $("prompt").value.trim();
  if (!prompt) return;
  $("summary").innerHTML = '<div class="summary">Подбираю примеры…</div>';
  $("preview").innerHTML = "";
  const r = await (await fetch("/api/search/preview", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({prompt}) })).json();
  if (r.error){ $("summary").innerHTML = '<div class="summary">Ошибка: '+r.error+'</div>'; return; }
  $("summary").innerHTML = `<div class="summary">Режим: <b>${r.mode}</b> · нашёл подходящих: <b>${r.christian}</b>. Ключевые слова: ${(r.searchConfig?.keywords||[]).join(", ")}<br>Примеры ниже — одобри направление, и я найду всё в этом стиле.</div>`;
  const cards = (r.samples||[]).map(c => `
    <div class="card">
      <img loading="lazy" src="${c.imageOriginal}" alt="">
      <div class="body"><h3>${c.title}</h3>
        <div class="meta"><span>$${c.price}</span>${c.rating?`<span>★ ${c.rating}</span>`:""}<span>${c.category}</span></div>
        ${c.classification?`<div class="cls">✓ ${c.classification.reason}</div>`:""}
      </div></div>`).join("");
  $("preview").innerHTML = `
    <div class="grid">${cards || '<p class="note">Ничего подходящего. Измени промпт.</p>'}</div>
    ${r.samples&&r.samples.length ? `<div style="display:flex;gap:10px;margin:18px 0">
      <button onclick="doSearchAll()">✓ Искать всё в этом направлении</button>
      <button class="ghost" onclick="document.getElementById('prompt').focus()">Изменить промпт</button>
    </div>` : ""}`;
}

// Ступень 2 — направление одобрено: полный прогон в очередь модерации
async function doSearchAll() {
  const prompt = $("prompt").value.trim();
  if (!prompt) return;
  $("preview").innerHTML = '<div class="summary">Ищу всё в этом направлении…</div>';
  const r = await (await fetch("/api/search", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({prompt}) })).json();
  $("summary").innerHTML = `<div class="summary">Готово: найдено <b>${r.found}</b> · добавлено в очередь на модерацию <b>${r.added}</b> · отсеяно классификатором <b>${r.rejected}</b>. Ниже одобряй каждый товар.</div>`;
  $("preview").innerHTML = "";
  tab = "pending"; syncTabs(); loadGrid(); refreshStatus();
}

async function doPublish() {
  const r = await (await fetch("/api/publish", { method:"POST" })).json();
  alert("Опубликовано товаров: " + r.count + "\n→ " + r.path);
}

function setMode(m){
  $("view-products").style.display = m==="products" ? "" : "none";
  $("view-studio").style.display = m==="studio" ? "" : "none";
  $("m-products").setAttribute("aria-selected", m==="products");
  $("m-studio").setAttribute("aria-selected", m==="studio");
}

let lastDesign = null;
async function doDesign(){
  const prompt = $("dprompt").value.trim();
  if (!prompt) return;
  $("dsummary").innerHTML = '<div class="summary">Генерирую принт…</div>';
  $("dresult").innerHTML = "";
  const r = await (await fetch("/api/design", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({prompt}) })).json();
  if (r.error){ $("dsummary").innerHTML = '<div class="summary">Ошибка: '+r.error+'</div>'; return; }
  lastDesign = { prompt, image: r.image };
  $("dsummary").innerHTML = `<div class="summary">Режим: <b>${r.mode}</b>${r.note?" · "+r.note:""}</div>`;
  $("dresult").innerHTML = `
    <div class="card" style="max-width:340px">
      <img src="${r.image}" alt="" style="background:#f3f1ee;object-fit:contain">
      <div class="body">
        <h3>${prompt}</h3>
        <div class="acts">
          <button onclick="saveDesign()">Сохранить как товар</button>
          <button class="ghost" onclick="document.getElementById('dprompt').focus()">Доработать</button>
        </div>
      </div>
    </div>`;
}
async function saveDesign(){
  if (!lastDesign) return;
  const r = await (await fetch("/api/design/save", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(lastDesign) })).json();
  alert(r.ok ? "Дизайн сохранён как товар (одобрен). Нажми «Опубликовать в витрину»." : "Ошибка сохранения");
  refreshStatus();
}

function switchTab(t){ tab=t; syncTabs(); loadGrid(); }
function syncTabs(){ document.querySelectorAll(".tabs button").forEach(b=>b.setAttribute("aria-selected", b.dataset.tab===tab)); }

async function loadGrid() {
  const items = await (await fetch("/api/queue?status="+tab)).json();
  if (!items.length) { $("grid").innerHTML = '<p class="note">Пусто.</p>'; return; }
  $("grid").innerHTML = items.map(c => {
    const img = (tab==="approved" && c.imageCut) ? "/sourced"+c.imageCut.replace("/products/sourced","") : c.imageOriginal;
    const acts = tab==="pending"
      ? `<div class="acts"><button onclick="moderate('${c.id}','approve')">Одобрить</button><button class="ghost" onclick="moderate('${c.id}','reject')">Отклонить</button></div>`
      : "";
    return `<div class="card"><img loading="lazy" src="${img}" alt=""><div class="body">
      <h3>${c.title}</h3>
      <div class="meta"><span>$${c.price}</span>${c.rating?`<span>★ ${c.rating}</span>`:""}${c.orders?`<span>${c.orders} зак.</span>`:""}<span>${c.category}</span></div>
      ${c.classification?`<div class="cls">✓ ${c.classification.reason} (${Math.round(c.classification.confidence*100)}%)</div>`:""}
      ${acts}</div></div>`;
  }).join("");
}

async function moderate(id, action) {
  await fetch("/api/moderate", { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({id, action}) });
  loadGrid(); refreshStatus();
}

refreshStatus(); loadGrid();
</script>
</body>
</html>
